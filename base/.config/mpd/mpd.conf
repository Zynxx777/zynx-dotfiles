# --- Files and Directories ---
music_directory    "/mnt/hdd_data1/Music"
playlist_directory "~/.config/mpd/playlists"
db_file            "~/.config/mpd/database"
log_file           "~/.config/mpd/log"
pid_file           "~/.config/mpd/pid"
state_file         "~/.config/mpd/state"
sticker_file       "~/.config/mpd/sticker.sql"

# --- General Daemon Options ---
# Allow connections from any device on your local network
bind_to_address    "0.0.0.0"
port               "6600"

# Automatically update the database when you add new files to /mnt/hdd_data1/Music
auto_update        "yes"
restore_paused     "yes"

# --- Audio Output: Local (P52 Speakers/Headphones) ---
audio_output {
    type        "pulse"
    name        "P52 Local Audio"
    # If you use PipeWire, it intercepts the "pulse" output seamlessly, 
    # so this works for both PulseAudio and PipeWire.
}

# --- Audio Output: Network Stream (Phones/Laptops) ---
audio_output {
    type            "httpd"
    name            "P52 Network Stream"
    encoder         "lame"        # mp3 format (widely supported)
    port            "8000"
    bind_to_address "0.0.0.0"
    bitrate         "128"         # 128kbps is a good balance for streaming over Wi-Fi
    format          "44100:16:2"
    max_clients     "0"           # No limit on connected devices
}

# ---- Visualizer:
    audio_output {
    type                    "fifo"
    name                    "my_fifo"
    path                    "/tmp/mpd.fifo"
    format                  "44100:16:2"
}
